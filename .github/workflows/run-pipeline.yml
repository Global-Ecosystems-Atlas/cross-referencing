name: Cross-Referencing Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  run_cross_referencing_pipeline:
    runs-on: ubuntu-latest
    environment: dev
    
    # 1. RUN THE ENTIRE JOB INSIDE THE ROCKER CONTAINER
    container: rocker/tidyverse:latest
    
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. R SETUP & DEPENDENCY STEPS ARE GONE - uses Rocked image
      # rocker/tidyverse already contains fs, gargle, glue, googlesheets4, readxl, and tidyverse.
      
      # 3. INSTALL ANY NICHE PACKAGES NOT IN THE BASE IMAGE
      # 'here' is usually included, but this one-liner is a lightning-fast safety net.
      - name: Ensure 'here' package is present
        run: Rscript -e 'if (!requireNamespace("here", quietly = TRUE)) install.packages("here")'

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y curl jq

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 4. FIX DOCKER/GIT PERMISSION ISSUES
      - name: Fix Git directory permissions
        run: git config --global --add safe.directory '*'

      - name: Run 'generate_templates.qmd' script
        run: quarto render code/generate_templates.qmd

      - name: Run 'generate_crosswalks.qmd' script
        run: quarto render code/generate_crosswalks.qmd

      - name: Run 'generate_gee_dictionaries.R' script
        run: Rscript code/generate_gee_dictionaries.R

      - name: Commit resources folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/
          git diff --cached --quiet || git commit -m "Automatic run of the cross-referencing pipeline"
          git push
